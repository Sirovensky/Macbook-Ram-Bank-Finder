# Force a low gfxmode so text is readable on Retina panels.  Without
# this, gfxmode=auto selects the native 2880x1800 (or 2560x1600) and
# the 16-px unicode.pf2 glyphs render tiny.  1024x768 makes each glyph
# roughly 3x larger, matching text-mode visibility.
if loadfont unicode ; then
    set gfxmode=1024x768,800x600,640x480,auto
    set gfxpayload=keep
    terminal_output gfxterm
fi

set default=0
set timeout=15
set timeout_style=menu
# Also bump the menu row count so entries aren't cramped.
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

insmod linux
insmod chain
insmod part_msdos
insmod part_gpt
insmod fat
insmod search
insmod search_fs_file

# Locate the FAT ESP that holds our EFI helpers.  Hybrid ISO has two
# partitions: an ISO9660 volume with grub + memtest (loaded via `linux`)
# and a FAT ESP (appended partition 2) with mask-shim + brr-entry.  On
# UEFI grub sometimes defaults to the ISO9660 view where the helpers
# don't live, so we probe for a known helper and set root accordingly.
search --file --no-floppy --set=brr_fs /EFI/BOOT/brr-entry.efi

# -----------------------------------------------------------------------
# Entry 1 — FULL TEST
#   Runs memtest with all 13 patterns.  Takes ~30-60 min on 32 GiB.
#   At pass end prints a line labelled "BAD ADDRESSES (N found) --
#   photograph this line:" followed by the comma-separated hex list,
#   then halts.  Photograph the list, power off, boot back to USB,
#   pick entry 3.
#
#   keyboard=both — use both the T2-proxied internal keyboard and any
#   USB-C external keyboard (memtest's xHCI driver can't reach either
#   post-EBS, but the pre-EBS efi_menu parser consumes this flag).
# -----------------------------------------------------------------------
menuentry "1. Full test  (all patterns, ~30-60 min) [DEFAULT]" {
    linux /EFI/BOOT/memtest keyboard=both
}

# -----------------------------------------------------------------------
# Entry 2 — FAST TEST
#   Same output as entry 1 but runs only 3 fast patterns (tests 0, 3, 5).
#   Takes ~5 min.  Good for a quick sanity check; run the full test
#   (entry 1) before making the actual decision.
#
#   brr_fast — consumed by src/efi_menu.c pre-EBS, returns
#   BRR_FLAG_SKIP_COUNTDOWNS which src/calibration.c reads to suppress
#   the timed photo pauses.
# -----------------------------------------------------------------------
menuentry "2. Fast test  (3 patterns, ~5 min)" {
    linux /EFI/BOOT/memtest keyboard=both brr_fast
}

# -----------------------------------------------------------------------
# Entry 3 — SETUP NVRAM HOOK + APPLY MASK
#   Loads brr-entry.efi (pre-ExitBootServices).  It:
#     - offers a quick-retry if NVRAM already has a saved mask (Y
#       applies it immediately, N discards and re-prompts)
#     - otherwise prompts for the bad addresses from the memtest photo
#     - writes BrrBadPages + BrrMaskState=TRIAL_PENDING_PAGE via
#       Boot Services SetVariable (the only T2-persistent path)
#     - chainloads mask-shim.efi which reserves +/-1 MiB around each
#       address via AllocatePages(EfiReservedMemoryType) and chains
#       the internal macOS boot.efi.
#
#   set root=$brr_fs — pins the chainloader root to the FAT ESP on
#   the appended hybrid-ISO partition (where brr-entry.efi lives).
#   Without this, grub sometimes defaults to the ISO9660 view where
#   the EFI helpers aren't visible.
# -----------------------------------------------------------------------
menuentry "3. Setup NVRAM hook + apply mask" {
    set root=$brr_fs
    chainloader /EFI/BOOT/brr-entry.efi
}
