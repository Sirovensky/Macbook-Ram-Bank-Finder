if loadfont unicode ; then
    set gfxmode=auto
    set gfxpayload=keep
    terminal_output gfxterm
fi

set default=0
set timeout=5

insmod linux

menuentry "a1990-memtest (auto scale, native GOP)" {
    linux /EFI/BOOT/memtest keyboard=both
}
menuentry "a1990-memtest (force scale=4)" {
    linux /EFI/BOOT/memtest keyboard=both screen.scale=4
}
menuentry "a1990-memtest (force scale=2)" {
    linux /EFI/BOOT/memtest keyboard=both screen.scale=2
}
menuentry "a1990-memtest (no scale, legacy tiny)" {
    linux /EFI/BOOT/memtest keyboard=both screen.scale=1
}
menuentry "a1990-memtest (nosmp/nobench, auto scale)" {
    linux /EFI/BOOT/memtest nosmp nosm nobench
}
