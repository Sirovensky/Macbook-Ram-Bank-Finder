if loadfont unicode ; then
    set gfxmode=auto
    set gfxpayload=keep
    terminal_output gfxterm
fi

set default=0
set timeout=15
set timeout_style=menu

insmod linux
insmod chain
insmod part_msdos
insmod part_gpt
insmod fat
insmod search
insmod search_fs_file

# Hybrid ISO has TWO partitions: an ISO9660 with grub + memtest (loaded
# via the `linux` command which goes through grub's ISO9660 driver) and
# a FAT ESP (appended as partition 2) holding our EFI helper binaries
# (mask-shim.efi, install.efi, revert.efi, brr-entry.efi).  grub's root
# on UEFI boot is the ESP, so chainloader works for the helpers -- but
# on some firmware grub defaults to the ISO9660 view instead, and those
# helper files won't be found there.  Probe for a known-helper marker
# and set root to whichever partition contains it, so chainloader always
# resolves against the FAT ESP regardless of firmware quirks.
search --file --no-floppy --set=brr_fs /EFI/BOOT/brr-entry.efi

# Entry 1 — Memtest detect (no auto-reboot).  Photograph bad addresses.
#
# Apple T2 silently drops post-ExitBootServices NVRAM writes -- memtest
# cannot reliably persist state to survive a reboot on this hardware.
# So entry 1 runs memtest, shows the bad-address list at pass end, and
# halts.  User photographs addresses, powers off, picks entry 8 on the
# next boot to type them in and apply the mask pre-EBS (the reliable
# path on T2).
menuentry "1. Memtest detect: run tests, list bad addresses, halt [DEFAULT]" {
    linux /EFI/BOOT/memtest keyboard=both
}

# Entry 2 — Memtest detect, single-core diagnostic.
#
# Same flow as entry 1 but nosmp.  Use to isolate SMP-related issues.
menuentry "2. Memtest detect: single-core diagnostic [slow]" {
    linux /EFI/BOOT/memtest keyboard=both nosmp
}

# Entry 3 — Memtest with interactive pre-boot menu
#
# No cmdline auto-flag: the EFI menu shows its selector and waits for
# [Enter]/[P]/[C]/[T]/[R].  Use this if you want to manually pick test
# settings or just run memtest without masking.
menuentry "3. Memtest with interactive menu" {
    linux /EFI/BOOT/memtest keyboard=both
}

# Entry 4 — Boot macOS normally (no mask, no shim)
#
# Loads mask-shim.efi with --passthrough, which skips all masking and
# chain-loads internal macOS boot.efi directly.  Safe bypass for A/B
# comparison, or to bypass a bad mask config.  State not modified.
menuentry "4. Boot macOS normally (no mask)" {
    set root=$brr_fs
    chainloader /EFI/BOOT/mask-shim.efi --passthrough
}

# Entry 5 — Revert all changes [REVERT]
#
# Loads revert.efi which prompts once for confirmation, then:
#   - Deletes \EFI\BRR\ files from internal ESP (restoring backup if present).
#   - Restores BootOrder from BrrBackupBootOrder (falls back to legacy
#     A1990MaskOriginalBootOrder for pre-BRR-rename installs).
#   - Deletes our BootNNNN entry.
#   - Deletes all BrrMaskState / BrrBadPages / BrrBadChips / backup vars
#     (plus legacy A1990* equivalents from older installs).
#   - Reboots.
# Idempotent: safe to run from any state (NONE -> no-op).
menuentry "5. Revert all changes [REVERT]" {
    set root=$brr_fs
    chainloader /EFI/BOOT/revert.efi
}

# Entry 6 — memtest single-core (diagnostic)
#
# Boots memtest with `nosmp` so only the BSP runs tests.  Use this to
# isolate SMP-related issues: if a crash reproduces on entry 1 but not
# here, the bug is in concurrent-error handling.  Much slower (single
# core) but known-stable behavior.  Pre-boot EFI menu still runs
# normally.
menuentry "6. Memtest single-core [DIAGNOSTIC, slow]" {
    linux /EFI/BOOT/memtest keyboard=both nosmp
}

# Entry 7 — Fast debug: 3 tests only [DEBUG]
#
# `brr_fast` cmdline narrows test_list to 3 fast/informative tests:
#   - Test 0 walking-ones addr (stuck bits)
#   - Test 3 moving-inversions 1s/0s (classic)
#   - Test 5 moving-inversions random (bit interference)
# Skips block_move (the wedge-prone one) + bit-fade (~90 min) + others.
# Cuts pass from ~30-60 min to ~5-10 min.  Same auto-mask + NVRAM +
# reboot flow as entry 1.  Use for iterating fixes during development.
menuentry "7. Memtest detect: fast 3-test mode [DEBUG, ~5 min]" {
    linux /EFI/BOOT/memtest keyboard=both brr_fast
}

# Entry 8 — Enter bad addresses manually + apply mask
#
# T2 Macs silently drop post-ExitBootServices NVRAM writes, so the
# automated memtest -> NVRAM -> reboot -> shim flow does not persist
# state on A1990.  This entry runs a pre-EBS address-entry tool that:
#   1. Prompts the user for bad addresses (hex, comma-separated) --
#      taken from photos of memtest's end-of-pass report.
#   2. Writes BrrBadPages + BrrMaskState=TRIAL_PENDING_PAGE via Boot
#      Services SetVariable (pre-EBS writes DO persist on T2).
#   3. Chainloads mask-shim.efi which applies the mask via
#      AllocatePages and boots macOS.
# All work stays inside Boot Services -- the path T2 firmware trusts.
menuentry "8. Enter bad addresses + apply mask (manual, reliable)" {
    set root=$brr_fs
    chainloader /EFI/BOOT/brr-entry.efi
}
