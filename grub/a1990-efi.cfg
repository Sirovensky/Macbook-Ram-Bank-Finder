if loadfont unicode ; then
    set gfxmode=auto
    set gfxpayload=keep
    terminal_output gfxterm
fi

set default=0
set timeout=15
set timeout_style=menu

insmod linux
insmod chain
insmod part_msdos
insmod part_gpt
insmod fat
insmod search
insmod search_fs_file

# Locate the FAT ESP that holds our EFI helpers.  Hybrid ISO has two
# partitions: an ISO9660 volume with grub + memtest (loaded via `linux`)
# and a FAT ESP (appended partition 2) with mask-shim + brr-entry.  On
# UEFI grub sometimes defaults to the ISO9660 view where the helpers
# don't live, so we probe for a known helper and set root accordingly.
search --file --no-floppy --set=brr_fs /EFI/BOOT/brr-entry.efi

# -----------------------------------------------------------------------
# Entry 1 — FULL TEST
#   Runs memtest with all 13 patterns.  Takes 30-60 min on 32 GiB.
#   At pass end prints the bad-address list and halts.
#   Photograph the list, power off, boot back to USB, pick entry 3.
# -----------------------------------------------------------------------
menuentry "1. Full test  (all patterns, ~30-60 min) [DEFAULT]" {
    linux /EFI/BOOT/memtest keyboard=both
}

# -----------------------------------------------------------------------
# Entry 2 — FAST TEST
#   Same output as entry 1 but runs only 3 fast patterns (tests 0, 3, 5).
#   Takes ~5 min.  Good for a quick sanity check; full test for the
#   actual decision.
# -----------------------------------------------------------------------
menuentry "2. Fast test  (3 patterns, ~5 min)" {
    linux /EFI/BOOT/memtest keyboard=both brr_fast
}

# -----------------------------------------------------------------------
# Entry 3 — NVRAM HOOK SETUP
#   Pre-EBS form.  User types the bad addresses from the memtest photo,
#   the tool writes NVRAM (BrrBadPages + BrrMaskState=TRIAL_PENDING_PAGE)
#   via Boot Services SetVariable (the path T2 persists), then
#   chainloads mask-shim.efi which applies the mask and boots macOS.
# -----------------------------------------------------------------------
menuentry "3. Setup NVRAM hook + apply mask" {
    set root=$brr_fs
    chainloader /EFI/BOOT/brr-entry.efi
}
