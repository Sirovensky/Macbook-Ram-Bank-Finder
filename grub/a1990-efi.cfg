if loadfont unicode ; then
    set gfxmode=auto
    set gfxpayload=keep
    terminal_output gfxterm
fi

set default=0
set timeout=15
set timeout_style=menu

insmod linux
insmod chain

# Entry 1 — Automatic: memtest + ram-fix [DEFAULT]
#
# Boots memtest86plus.  On startup, memtest's pre-ExitBootServices EFI menu
# (src/efi_menu.c) reads BrrMaskState from NVRAM and branches:
#
#   State absent / NONE    -> show selector: [Enter] memtest / [P]age / [C]hip /
#                              [T] fast / [R] reboot
#   TRIAL_PENDING_PAGE     -> efi_menu chainloads \EFI\BOOT\mask-shim.efi
#                              (shim reads BrrBadPages, applies mask, sets
#                              TRIAL_BOOTED, chains macOS — no memtest re-run)
#   TRIAL_PENDING_CHIP     -> same; shim reads BrrBadChips, walks PA range,
#                              reserves every page mapping to the bad chip
#   TRIAL_BOOTED           -> prompt Y/Y "install permanently?" and chainload
#                              install.efi on double-confirm (never returns)
#   PERMANENT_*            -> only reached from internal-disk shim boot; not
#                              triggered here
menuentry "1. Automatic: memtest + ram-fix [DEFAULT]" {
    linux /EFI/BOOT/memtest keyboard=both
}

# Entry 2 — Run memtest (detect bad RAM)
#
# Alias for entry 1 (identical behaviour).  Kept separate as documentation of
# the "run memtest with no auto-apply" intent — user can press [Enter] in the
# EFI menu.  Useful if state is TRIAL_BOOTED but user wants to re-test first.
menuentry "2. Run memtest only (diagnostic)" {
    linux /EFI/BOOT/memtest keyboard=both
}

# Entry 3 — Boot macOS normally (no mask, no shim)
#
# Loads mask-shim.efi with --passthrough, which skips all masking and
# chain-loads internal macOS boot.efi directly.  Safe bypass for A/B
# comparison, or to bypass a bad mask config.  State not modified.
menuentry "3. Boot macOS normally (no mask)" {
    chainloader /EFI/BOOT/mask-shim.efi --passthrough
}

# Entry 4 — Revert all changes [REVERT]
#
# Loads revert.efi which prompts once for confirmation, then:
#   - Deletes \EFI\BRR\ files from internal ESP (restoring backup if present).
#   - Restores BootOrder from BrrBackupBootOrder (falls back to legacy
#     A1990MaskOriginalBootOrder for pre-BRR-rename installs).
#   - Deletes our BootNNNN entry.
#   - Deletes all BrrMaskState / BrrBadPages / BrrBadChips / backup vars
#     (plus legacy A1990* equivalents from older installs).
#   - Reboots.
# Idempotent: safe to run from any state (NONE -> no-op).
menuentry "4. Revert all changes [REVERT]" {
    chainloader /EFI/BOOT/revert.efi
}
